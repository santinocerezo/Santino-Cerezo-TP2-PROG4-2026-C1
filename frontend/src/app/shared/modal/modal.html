@if (noti.actual(); as n) {
  <div class="overlay" (click)="noti.cerrar()">
    <div class="modal" [class]="n.tipo" (click)="$event.stopPropagation()">
      <div class="icono">
        @switch (n.tipo) {
          @case ('exito') { ✓ }
          @case ('error') { ✕ }
          @default { @if (n.confirm) { ? } @else { i } }
        }
      </div>
      <h3>{{ n.titulo }}</h3>
      <p>{{ n.mensaje }}</p>

      @if (n.confirm) {
        <div class="modal-botones">
          <button class="btn btn-secundario" (click)="noti.cerrar()">Cancelar</button>
          <button class="btn btn-primary" (click)="confirmar()">Confirmar</button>
        </div>
      } @else {
        <button class="btn btn-primary btn-bloque" (click)="noti.cerrar()">Entendido</button>
      }
    </div>
  </div>
}
