<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="marca">
      <img class="marca-logo-img" src="favicon.svg" alt="Logo Red Social" />
      <span class="marca-texto">Red Social</span>
    </a>

    <nav class="links">
      <a routerLink="/" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">Publicaciones</a>
      <a routerLink="/mi-perfil" routerLinkActive="activo">Mi perfil</a>
    </nav>

    <div class="acciones">
      @if (auth.estaLogueado()) {
        <a routerLink="/mi-perfil" class="usuario-chip" title="Ver mi perfil">
          @if (auth.usuario()?.fotoPerfil) {
            <img [src]="auth.usuario()!.fotoPerfil" [alt]="auth.usuario()?.nombreUsuario" />
          } @else {
            <span class="avatar-iniciales">{{ inicial() }}</span>
          }
          <span class="usuario-nombre">{{ auth.usuario()?.nombreUsuario }}</span>
        </a>
        <button class="btn btn-secundario btn-sm" (click)="cerrarSesion()">Salir</button>
      } @else {
        <a routerLink="/login" class="btn btn-secundario btn-sm">Ingresar</a>
        <a routerLink="/registro" class="btn btn-primary btn-sm">Crear cuenta</a>
      }
    </div>
  </div>
</header>
