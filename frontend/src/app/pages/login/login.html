<div class="centrado-vertical">
  <div class="card auth-card">
    <h1 class="card-titulo">Iniciar sesión</h1>
    <p class="subtitulo">Ingresá para entrar a la Red Social.</p>

    <form [formGroup]="form" (ngSubmit)="enviar()">
      <div class="form-grupo">
        <label for="identificador">Correo o nombre de usuario</label>
        <input
          id="identificador"
          type="text"
          formControlName="identificador"
          placeholder="tu@correo.com o tu_usuario"
          [class.invalido]="esInvalido('identificador')"
        />
        @if (esInvalido('identificador')) {
          <span class="error-texto">Este campo es obligatorio.</span>
        }
      </div>

      <div class="form-grupo">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalido]="esInvalido('password')"
        />
        @if (esInvalido('password')) {
          <span class="error-texto">
            Mínimo 8 caracteres, con al menos una mayúscula y un número.
          </span>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-bloque mt-1" [disabled]="cargando()">
        @if (cargando()) {
          <span class="spinner"></span> Ingresando...
        } @else {
          Ingresar
        }
      </button>
    </form>

    <p class="texto-centro mt-2 ayuda-texto">
      ¿No tenés cuenta? <a routerLink="/registro">Creá una acá</a>
    </p>
  </div>
</div>
